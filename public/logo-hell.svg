<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund: Weiß (transparent für Verwendung auf hellen Flächen) -->
  <rect width="400" height="120" fill="white"/>

  <!-- TR – Navy, fett, Georgia -->
  <text x="20" y="84"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        font-weight="bold"
        fill="#1B3A5C"
        letter-spacing="-1">TR</text>

  <!-- Gold-Akzentlinie unter TR -->
  <rect x="20" y="92" width="120" height="3" fill="#C8A951"/>

  <!-- Vertikaler Trenner -->
  <rect x="158" y="18" width="1.5" height="76" fill="#C8A951" opacity="0.45"/>

  <!-- Creative – Navy, Georgia, normal -->
  <text x="174" y="64"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="normal"
        fill="#1B3A5C"
        letter-spacing="4">Creative</text>

  <!-- Tagline -->
  <text x="175" y="88"
        font-family="Calibri, 'Segoe UI', sans-serif"
        font-size="9.5"
        font-weight="normal"
        fill="#C8A951"
        letter-spacing="4.5">DIGITALE AGENTUR</text>
</svg>
